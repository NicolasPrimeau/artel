name: CI

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --dev

      - name: Lint
        if: matrix.python-version == '3.13'
        run: uv run ruff check .

      - name: Format check
        if: matrix.python-version == '3.13'
        run: uv run ruff format --check .

      - name: Test
        run: uv run python -m pytest tests/ -v

  docker:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/nicolasprimeau/artel
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/master' }}

      - name: Resolve package version
        id: pkg_version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(git describe --tags --abbrev=0 | sed 's/^v//')" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ARTEL_VERSION=${{ steps.pkg_version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  openapi:
    needs: test
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync

      - name: Generate openapi.json
        run: uv run python scripts/gen_openapi.py > openapi.json

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add openapi.json
          git diff --cached --quiet || git commit -m "chore: update openapi.json [skip ci]"
          git pull --rebase
          git push

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: master

      - name: Update manifest versions
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          python3 - <<EOF
          import json, pathlib
          v = "$VERSION"
          p = pathlib.Path(".claude-plugin/plugin.json")
          d = json.loads(p.read_text())
          d["version"] = v
          p.write_text(json.dumps(d, indent=2) + "\n")
          p = pathlib.Path(".claude-plugin/marketplace.json")
          d = json.loads(p.read_text())
          for plugin in d.get("plugins", []):
              plugin["version"] = v
          p.write_text(json.dumps(d, indent=2) + "\n")
          EOF

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/plugin.json .claude-plugin/marketplace.json
          git diff --cached --quiet || git commit -m "chore: bump manifest versions to ${GITHUB_REF_NAME#v} [skip ci]"
          git pull --rebase
          git push

  deploy-sandbox:
    needs: docker
    if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to sandbox
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            IMAGE="ghcr.io/nicolasprimeau/artel:${GITHUB_REF_NAME#v}"
          else
            IMAGE="ghcr.io/nicolasprimeau/artel:edge"
          fi
          flyctl deploy --app artel-sandbox --image "$IMAGE" --yes
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
